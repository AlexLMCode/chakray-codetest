spring.application.name=chakrayCodeTest

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/chakraydb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
# spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Seeds: Execute seeds after Hibernate initializes the schema
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

spring.jackson.property-naming-strategy=SNAKE_CASE

# DevTools
spring.devtools.restart.enabled=true

#Password encriptions
jasypt.encryptor.password=mySecretKey12345
jasypt.encryptor.algorithm=PBEWithHmacSHA256AndAES_256

